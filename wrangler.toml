# AfriLab - Cloudflare Configuration
name = "afrilab"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# D1 Database - SQLite at the edge
[[d1_databases]]
binding = "DB"
database_name = "afrilab-db"
database_id = "95be7e96-2937-4f88-9c05-51e277c1c023"

# R2 Object Storage - For 3D models, videos, assets
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "afrilab-assets"

# KV Namespace - For sessions and caching
[[kv_namespaces]]
binding = "SESSIONS"
id = "db42293a406647be93d8426eb8cdc0aa"

# Workers AI - Llama integration
[ai]
binding = "AI"

# Environment variables (local dev only)
# Production vars are set in the Cloudflare Pages dashboard:
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET (encrypted secrets)
#   GOOGLE_REDIRECT_URI = https://afrilab.pages.dev/auth/google/callback
[vars]
APP_NAME = "AfriLab"
APP_ENV = "development"
GOOGLE_REDIRECT_URI = "http://localhost:8788/auth/google/callback"

# Note: For demo cleanup cron job, create a separate Cloudflare Worker
# with the following trigger configuration:
# [triggers]
# crons = ["0 * * * *"]  # Run every hour
#
# The worker should call POST /api/demo-cleanup with X-Cron-Secret header
# Set CRON_SECRET and SEED_SECRET in your Cloudflare dashboard secrets
